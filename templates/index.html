<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentimentAI | Glassmorphic Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Sentiment<span>AI</span></h1>
            <p>Advanced LSTM-powered sentiment analysis</p>
        </header>

        <main class="glass-card">
            <div class="input-section">
                <label for="review-input">Analyze Movie Review</label>
                <textarea id="review-input" placeholder="Paste a movie review here... e.g., 'The acting was phenomenal and the story kept me on the edge of my seat!'"></textarea>
                <button id="analyze-btn">Analyze Sentiment</button>
            </div>

            <div id="result-area" class="result-section hidden">
                <div class="divider"></div>
                <div class="result-display">
                    <div class="sentiment-indicator">
                        <span id="sentiment-label"></span>
                    </div>
                    <div class="confidence-bar">
                        <div class="bar-bg">
                            <div id="confidence-fill" class="bar-fill"></div>
                        </div>
                        <span id="confidence-text">0% Confidence</span>
                    </div>
                </div>
            </div>
            
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Analyzing context...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Production-Grade AI Demo</p>
        </footer>
    </div>

    <script>
        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const text = document.getElementById('review-input').value;
            const resultArea = document.getElementById('result-area');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('analyze-btn');

            if (!text.trim()) {
                alert('Please enter some text to analyze.');
                return;
            }

            // UI State: Loading
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            btn.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    displayResult(data);
                }
            } catch (err) {
                alert('Connection error. Is the server running?');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        });

        function displayResult(data) {
            const resultArea = document.getElementById('result-area');
            const labelEl = document.getElementById('sentiment-label');
            const fillEl = document.getElementById('confidence-fill');
            const textEl = document.getElementById('confidence-text');

            labelEl.textContent = data.label;
            labelEl.className = data.label.toLowerCase(); // 'positive' or 'negative' class
            
            fillEl.style.width = data.confidence + '%';
            fillEl.className = 'bar-fill ' + data.label.toLowerCase();
            
            textEl.textContent = `${data.confidence}% Confidence`;

            resultArea.classList.remove('hidden');
        }
    </script>
</body>
</html>
